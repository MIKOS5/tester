<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Used & Restored Gear Store</title>
    <style>
        body {
            font-family: Verdana, Geneva, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f4f4f4;
            display: flex;
            flex-direction: column;
        }
        header {
            background-color: #798a6a;
            color: white;
            text-align: center;
            padding: 10px;
        }
        header h1 {
            margin: 0;
        }
        .button-container {
            text-align: center;
            margin: 20px 0;
        }
        .button-container button {
            padding: 10px 20px;
            margin: 5px;
            background-color: #4CAF50;
            color: white;
            border: none;
            cursor: pointer;
            font-size: 16px;
        }
        .button-container button:hover {
            background-color: #45a049;
        }
        .product-container {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            margin: 20px;
        }
        .product-card {
            background-color: white;
            margin: 10px;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
            width: 200px;
            text-align: center;
        }
        .product-card h3 {
            font-size: 16px;
            margin: 10px 0;
        }
        .product-card .price {
            font-weight: bold;
            font-size: 18px;
            color: #2d6a4f;
        }
        .product-card .stock {
            color: #f39c12;
            margin-top: 10px;
        }
        .product-card .promo {
            background-color: #e74c3c;
            color: white;
            padding: 5px;
            border-radius: 5px;
            margin-top: 5px;
        }
        .product-card .view-results {
            background-color: #3498db;
            color: white;
            padding: 10px;
            margin-top: 10px;
            text-decoration: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 14px;
            display: inline-block;
        }
        .product-card .view-results:hover {
            background-color: #2980b9;
        }

        .product-card .f-button {
            background-color: #add8e6; /* Light blue */
            color: white;
            padding: 10px;
            margin-top: 10px;
            text-decoration: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 14px;
            display: inline-block;
        }

        .product-card .f-button:hover {
            background-color: #87ceeb; /* Lighter blue on hover */
        }
    </style>
</head>
<body>

<header>
    <h1>Used & Restored Gear Store</h1>
    <p>Your trusted source for quality gear</p>
</header>

<div class="button-container">
    <button onclick="sortProducts('name', 'asc')">Sort by Name (Asc)</button>
    <button onclick="sortProducts('name', 'desc')">Sort by Name (Desc)</button>
    <button onclick="sortProducts('price', 'asc')">Sort by Price (Asc)</button>
    <button onclick="sortProducts('price', 'desc')">Sort by Price (Desc)</button>
    <button onclick="sortProducts('stock', 'asc')">Sort by Stock (Asc)</button>
    <button onclick="sortProducts('stock', 'desc')">Sort by Stock (Desc)</button>
</div>

<div id="productsContainer" class="product-container">
    <!-- Product cards will be dynamically inserted here -->
</div>

<script>
    const csvFilePath = 'https://script.google.com/macros/s/AKfycbw2ygas7GeNtrOUSVo2L8xMe3pHHyYZmHS936xmude6D70z6byyFnIaQtd1aOqSPl-ueg/exec';
    let products = [];

    function parseCSV(data) {
        const rows = data.split('\n');
        rows.slice(1).forEach(row => {
            const columns = row.split(',');

            if (columns.length > 1) {
                const itemName = columns[1]?.trim() || "No Item Name";
                const category = columns[2]?.trim() || "No Category";
                const brand = columns[3]?.trim() || "No Brand";
                const model = columns[4]?.trim() || "No Model";
                const condition = columns[6]?.trim() || "No Condition";
                const description = columns[7]?.trim() || "No Description";
                const price = columns[30]?.trim() || "0.00"); // Adjusted to Column 30 for Price
                const stockLevel = columns[6]?.trim() || "0");
                const promo = columns[19]?.trim() || "";
                const weight = columns[20]?.trim() || "0.0";

                const product = {
                    itemName,
                    category,
                    brand,
                    model,
                    condition,
                    description,
                    price,
                    stockLevel,
                    promo,
                    weight
                };
                products.push(product);
            }
        });
        displayProducts(products);
    }

    function displayProducts(products) {
        const productsContainer = document.getElementById('productsContainer');
        productsContainer.innerHTML = '';

        products.forEach(product => {
            const productCard = document.createElement('div');
            productCard.classList.add('product-card');

            productCard.innerHTML = `
                <h3>${product.itemName}</h3>
                <p><strong>Category:</strong> ${product.category}</p>
                <p><strong>Brand:</strong> ${product.brand}</p>
                <p><strong>Model/Series:</strong> ${product.model}</p>
                <p><strong>Condition:</strong> ${product.condition}</p>
                <p><strong>Description:</strong> ${product.description}</p>
                <p><strong>Price:</strong> ${product.price}</p>
                <p class="price">${product.price > 0 ? `$${product.price.toFixed(2)}` : 'Price Unavailable'}</p>
                ${product.promo ? `<p class="promo">Promo: ${product.promo}</p>` : ''}
                ${product.stockLevel > 0 ? `<p class="stock">Stock: ${product.stockLevel}</p>` : ''}
                ${product.weight && product.weight !== '0.0' ? `<p class="weight">Weight: ${product.weight} lbs</p>` : ''}
                <a href="https://www.google.com/search?hl=en&tbm=isch&q=${encodeURIComponent(product.itemName)}" target="_blank" class="view-results">View Results</a>
                <a href="https://www.facebook.com/marketplace/la/search/?query=${encodeURIComponent(product.itemName)}" target="_blank" class="f-button">F</a>
            `;
            productsContainer.appendChild(productCard);
        });
    }

    function sortProducts(column, order) {
        let sortedProducts = [...products];

        if (column === 'name') {
            sortedProducts.sort((a, b) => {
                return order === 'asc' ? a.itemName.localeCompare(b.itemName) : b.itemName.localeCompare(a.itemName);
            });
        } else if (column === 'price') {
            sortedProducts.sort((a, b) => {
                return order === 'asc' ? a.price - b.price : b.price - a.price;
            });
        } else if (column === 'stock') {
            sortedProducts.sort((a, b) => {
                return order === 'asc' ? a.stockLevel - b.stockLevel : b.stockLevel - a.stockLevel;
            });
        }

        displayProducts(sortedProducts);
    }

    fetch(csvFilePath)
        .then(response => response.text())
        .then(data => parseCSV(data))
        .catch(error => console.error('Error fetching the CSV file:', error));

</script>

</body>
</html>
