<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gear & Tools Hub</title>
<style>
  /* Base Layout */
  body {
    margin: 0;
    padding: 0;
    font-family: Arial, sans-serif;
    display: flex;
    height: 100vh;
    overflow: hidden;
    background: #f4f4f4;
  }

  /* Sidebar */
  .sidebar {
    width: 220px;
    background: #333;
    color: white;
    display: flex;
    flex-direction: column;
    padding-top: 20px;
  }
  .sidebar h2 {
    text-align: center;
    margin-bottom: 20px;
    font-size: 1.5em;
    border-bottom: 1px solid #555;
    padding-bottom: 10px;
  }
  .sidebar a {
    color: white;
    text-decoration: none;
    padding: 12px 20px;
    margin: 5px 10px;
    border-radius: 6px;
    transition: all 0.2s ease;
    font-weight: bold;
  }
  .sidebar a:hover {
    background: #555;
    transform: translateX(5px);
  }

  /* Main content area */
  .main-content {
    flex: 1;
    display: flex;
    flex-direction: column;
  }

  header {
    background: #444;
    color: white;
    text-align: center;
    padding: 20px;
  }
  header h1 {
    margin: 0;
    font-size: 1.8em;
  }
  header p {
    margin: 5px 0 0;
    font-size: 0.9em;
    opacity: 0.8;
  }

  iframe {
    flex: 1;
    border: none;
    width: 100%;
    background: white;
  }

  /* Responsive tweaks */
  @media (max-width: 768px) {
    body {
      flex-direction: column;
    }
    .sidebar {
      width: 100%;
      flex-direction: row;
      overflow-x: auto;
    }
    .sidebar a {
      flex: 1 0 auto;
      margin: 5px;
      text-align: center;
    }
    .main-content {
      flex: 1;
    }
  }
</style>
</head>
<body>

<!-- Sidebar Navigation -->
<div class="sidebar">
  <h2>Navigation</h2>
  <a href="inventory.html" target="contentFrame">Gear Inventory</a>
  <a href="Front.html" target="contentFrame">For Sale</a>
  <a href="inventorydetails.html" target="contentFrame">Inventory Details</a>
  <!-- Add more links as needed -->
</div>

<!-- Main Content Area -->
<div class="main-content">
  <header>
    <h1>My Gear & Tools Hub</h1>
    <p>Quick access to your inventory and tools</p>
  </header>

  <!-- Windowed Page -->
  <iframe name="contentFrame" src="inventory.html"></iframe>
</div>

</body>
</html>
